        function retrieveData(path) {
            return new Promise((resolve, reject) => {

                    const data = snapshot.val();
                    if (data) {
                        resolve(data); // 데이터를 Promise로 반환
                    } else {
                        console.log(`No data found at ${path}.`);
                        resolve(null); // 데이터가 없을 경우 null 반환
                    }
                }, (error) => {
                    console.error(`Error retrieving data from ${path}:`, error);
                    reject(error); // 에러를 Promise로 반환
                });
            });
        }

            const content = document.getElementById(contentId);

        async function fetchStockData(stocks) {
            const baseUrl = "https://yfapi.net/v6/finance/quote";
            const sparkUrl = "https://yfapi.net/v8/finance/spark";
            const availableKeys = [...apikeyList];
            let currentIndex = 0;

            function getNextApiKey() {
                if (availableKeys.length === 0) {
                    console.log("모든 API 키가 제한에 도달했습니다.");
                    throw new Error("모든 API 키가 제한에 도달했습니다.");
                }
                currentIndex = (currentIndex) % apikeyList.length;
                return apikeyList[currentIndex];
            }

            async function fetchBatch(symbols) {
                let success = false;
                while (!success) {
                    const apiKey = getNextApiKey();
                    const baseOptions = {
                        method: 'GET',
                        url: baseUrl,
                        params: { symbols: symbols.join(","), region: 'US' },
                        headers: {
                            'x-api-key': apiKey
                        }
                    };

                    try {
                        const response = await axios.request(baseOptions);
                        return response.data.quoteResponse.result;
                    } catch (error) {
                        availableKeys.splice(currentIndex, 1);
                    }
                }
            }

            async function fetchBatchSpark(symbols) {
                let success = false;
                while (!success) {
                    const apiKey = getNextApiKey();
                    const baseOptions = {
                        method: 'GET',
                        url: sparkUrl,
                        params: { symbols: symbols.join(","), region: 'US' ,interval:'1d', range:'1mo'},
                        headers: {
                            'x-api-key': apiKey
                        }
                    };

                    try {
                        const response = await axios.request(baseOptions);
                        return response.data;
                    } catch (error) {
                        availableKeys.splice(currentIndex, 1);
                        success = true;
                    }
                }
            }

            const results = [];
            for (let i = 0; i < stocks.length; i += 10) {
                const batch = stocks.slice(i, i + 10);
                const symbols = batch.map(stock => stock.ticker + '.KS');
                const batchData = await fetchBatch(symbols);
                const batchDataSpark = await fetchBatchSpark(symbols);
                batch.forEach((stock, index) => {
                    const data = batchData.find(item => item.symbol === symbols[index]);
                    if (data) {
                        const beforeTotal = stock.before1 + stock.before2 + stock.before3 + stock.before4;
                        const afterTotal = stock.after1 + stock.after2 + stock.after3 + stock.after4;
                        stock.price = data.regularMarketPrice;
                        stock.per = data.marketCap / (afterTotal * 100000000);
                        totalSeed += stock.price*stock.count;
                        totalSeedBefore += stock.price*stock.count;
                        stock.id = data.shortName;
                        
                        stock.growth = round(((afterTotal - beforeTotal) / beforeTotal) * 100, 2);
                        stock.performance = batchDataSpark[symbols[index]].chartPreviousClose;
                        console.log(stock.id +" per: " + stock.per+"배,  growth: " + stock.growth+"%" );
                        let idea = stock.id + ": ";
                        if(data.marketCap < 10000000000000){
                            idea += "시총기준 미달 , ";
                        }else{
                            idea += "시총기준 적합 , ";
                        }
                        if(stock.per >= 25){
                            idea += "per 기준 과열 , ";
                        }else{
                            idea += "per 기준 적합 , ";
                        }
                        if(stock.per > stock.growth){
                            idea += "PEG 기준 미달";
                        }else{
                            idea += "PEG 기준 적합";
                        }
                        console.log(idea);
                    }
                    if(stock.isOperatingMarginMet){
                        results.push(stock);
                    }
                });
            }
            return results;
        }


        async function init() {
            try {
                dataset = await fetchStockData(stocks);
                for (let stock of dataset) {
                    stock.targetPrice = stock.price * Math.sqrt(Math.min(stock.growth, 25) / stock.per);
                    stock.point = stock.growth * (30 - stock.per);
                    if(stock.growth < stock.per || (stock.count > 0 && stock.per > 25) || (stock.count == 0 && stock.per > 27)){
                        stock.point = 0;
                    }
                }
                const totalPoint = dataset.reduce((sum, stock) => sum + stock.point, 0);
                dataset.forEach(stock => {
                    stock.allocation = (stock.point / totalPoint) * 100;
                    stock.targetCount = Math.floor((totalSeed * stock.allocation / 100) / stock.price);
                });

                let remains = totalSeed - dataset.reduce((sum, stock) => sum + (stock.targetCount * stock.price), 0);

                while (remains > 0) {
                    let bought = false;
                    for (let stock of dataset) {
                        if (remains >= stock.price && stock.point > 0) {
                            stock.targetCount++;
                            remains -= stock.price;
                            bought = true;
                        }
                    }

        function getLegendResponsiveOptions() {

        // 억 단위 소수값을 "n억 n,nnn만원" 형태의 실제 금액 문자열로 변환
        // manwon: 만원 단위 숫자 (예: 184246 → "18억 4,246만원")
        function formatManwon(manwon) {
            const total = Math.round(manwon);
            const sign = total < 0 ? '-' : '';
            const abs = Math.abs(total);
            const eok = Math.floor(abs / 10000);
            const man = abs % 10000;
            if (eok > 0 && man > 0) return `${sign}${eok}억 ${man.toLocaleString()}만원`;
            if (eok > 0) return `${sign}${eok}억원`;
            return `${sign}${man.toLocaleString()}만원`;
        }

        function round(value, decimals) {
            return Number(Math.round(value + "e" + decimals) + "e-" + decimals);
        }
        function getRetireMoney(curMoney){
            let realCurMoney = curMoney * 100000000;
            console.log("curMoney : " + realCurMoney);
            const dividendRate = 0.01;
            // 인출률 3.5% (기존 0.25=25%로 잘못 들어가 있던 값을 사용자 의도대로 수정)
            const withdrawalRate = 0.035;
            const capitalGainTaxThreshold = 2500000;
            const capitalGainTaxRate = 0.22;
            const dividendTaxRate = 0.2709;
            const financialIncomeThreshold = 20000000;
            const healthInsuranceRate = 0.0709;
            const longTermCareRate = 0.009;
            //연간인출액
            const annualWithdrawal = realCurMoney * withdrawalRate;
            console.log("annualWithdrawal : " +annualWithdrawal);
            //양도세
            const taxableCapitalGain = Math.max(0, annualWithdrawal - capitalGainTaxThreshold);
            const capitalGainTax = taxableCapitalGain * capitalGainTaxRate;
            //순 인출액
            const netWithdrawal = annualWithdrawal - capitalGainTax;
            //배당 수익 및 세금
            const dividendIncome = realCurMoney * dividendRate;
            const dividendTax = dividendIncome * dividendTaxRate;
            const netDividend = dividendIncome - dividendTax;
            //총 금융소득
            let totalFinancialIncome = netWithdrawal + netDividend;
            console.log("totalFinancialIncome : " +totalFinancialIncome);
            if(totalFinancialIncome > financialIncomeThreshold){
                const excessIncome = totalFinancialIncome - financialIncomeThreshold;
                const healthInsurancePremium = excessIncome * (healthInsuranceRate + longTermCareRate);
                totalFinancialIncome -= healthInsurancePremium;
            }
            const monthlyUsableAmount = totalFinancialIncome / 12
            console.log("monthlyUsableAmount : " +monthlyUsableAmount);
            return Math.round(monthlyUsableAmount);
        }
        // 차트 데이터를 업데이트하는 함수
        async function updateChart() {
            // 입력된 시작 및 종료 날짜 가져오기
            const startDate = new Date(document.getElementById("startDate").value);
            startDate.setHours(0, 0, 0, 0);
            const endDateInput = document.getElementById("endDate").value.split("-");
            const endYear = parseInt(endDateInput[0]);
            const endMonth = parseInt(endDateInput[1]);
            const endDate = new Date(endYear, endMonth, 0);
            endDate.setHours(0, 0, 0, 0);

            // 선택된 기간에 맞게 dataset2 데이터 필터링
            const filteredData = dataset2.filter(data => {
                const [year, month] = data.date.split('년 ');
                const formattedDate = new Date(parseInt(year), parseInt(month.replace('월', '').trim()) - 1, 1);
                formattedDate.setHours(0, 0, 0, 0);
                return formattedDate.getTime() >= startDate.getTime() && formattedDate.getTime() <= endDate.getTime();
            });

            // 필터링된 데이터로 차트 업데이트
            myChart2.data.labels = filteredData.map(data => data.date);
            myChart2.data.datasets[0].data = filteredData.map(data => data.targetMoney);
            myChart2.data.datasets[1].data = filteredData.map(data => data.currentMoney);
            myChart2.data.datasets[2].data = filteredData.map(data => data.subLine);
            myChart2.data.datasets[3].data = filteredData.map(data => data.retireLimit);
            myChart2.data.datasets[4].data = filteredData.map(data => data.inflationAdjustedTarget);
            myChart2.data.datasets[5].data = filteredData.map(data => getRetireMoney(data.subLine) / 10000.0);

            myChart2.update(); // 차트 업데이트
        }
        preQuery();
    </script>
